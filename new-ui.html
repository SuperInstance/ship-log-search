<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#050b13">
<title>Ship Log · Search & Logbook</title>
<style>
:root {
  --bg: #050b13;
  --bg-grad: radial-gradient(ellipse at top, #0a1828 0%, #050b13 60%);
  --surface: #0d1822;
  --surface-2: #14222f;
  --surface-3: #1c2c3e;
  --border: #233447;
  --border-strong: #344c66;
  --text: #e8eef5;
  --text-dim: #8a9aac;
  --text-bright: #ffffff;
  --accent: #5ab8e8;
  --accent-strong: #7ec8f0;
  --accent-soft: rgba(90,184,232,0.15);
  --green: #4ade80;
  --green-soft: rgba(74,222,128,0.15);
  --amber: #fbbf24;
  --amber-soft: rgba(251,191,36,0.15);
  --red: #ef4444;
  --red-soft: rgba(239,68,68,0.15);
  --purple: #c084fc;
  --purple-soft: rgba(192,132,252,0.15);
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --tap: 48px;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  background: var(--bg);
  background-image: var(--bg-grad);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.45;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; }
[hidden] { display: none !important; }

/* ── Layout ─────────────────────────────────────────────────── */
.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* ── Header ─────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 20px 0 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.logo {
  font-size: 26px;
  filter: drop-shadow(0 0 8px var(--accent-soft));
  flex-shrink: 0;
}
.brand h1 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-bright);
}
.brand .sub {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-top: 2px;
}
.stats {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Tabs ───────────────────────────────────────────────────── */
.tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
  background: var(--surface);
  padding: 6px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  min-height: var(--tap);
  padding: 8px 4px;
  background: transparent;
  color: var(--text-dim);
  border: 0;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: var(--text); background: var(--surface-2); }
.tab:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
.tab[aria-selected="true"] {
  background: var(--accent-soft);
  color: var(--accent-strong);
}
.tab-icon { font-size: 20px; line-height: 1; }

/* ── Panels ─────────────────────────────────────────────────── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}

/* ── Forms ──────────────────────────────────────────────────── */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.field label, .label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 700;
}
.input, input[type="text"], input[type="number"], input[type="date"], textarea, select {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 16px; /* prevent iOS zoom */
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  min-height: var(--tap);
  -webkit-appearance: none;
  appearance: none;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  background: var(--surface-3);
}
input::placeholder, textarea::placeholder { color: var(--text-dim); opacity: 0.7; }
textarea {
  resize: vertical;
  min-height: 110px;
  font-family: inherit;
  line-height: 1.5;
}
select {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%238a9aac' d='M6 8L0 0h12z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 10px;
  padding-right: 36px;
}

/* ── Buttons ────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--accent);
  color: #02131e;
  border: 0;
  border-radius: var(--radius-sm);
  padding: 0 20px;
  height: var(--tap);
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: var(--accent-strong); }
.btn:active { transform: translateY(1px); }
.btn:focus-visible { outline: 2px solid var(--accent-strong); outline-offset: 2px; }
.btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.btn-primary { width: 100%; }
.btn-ghost {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface-3); border-color: var(--accent); }
.btn-danger {
  background: transparent;
  color: var(--red);
  border: 1px solid var(--border);
  padding: 0 12px;
  height: 36px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.02em;
  border-radius: var(--radius-sm);
}
.btn-danger:hover { background: var(--red-soft); border-color: var(--red); }
.btn-danger:focus-visible { outline-color: var(--red); }
.btn-block { width: 100%; }
.btn-stack > * + * { margin-top: 10px; }

/* ── Quick suggestion chips ─────────────────────────────────── */
.quick-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.quick-chips .chip-label {
  flex-basis: 100%;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 700;
  margin-bottom: 2px;
}

/* ── Generic chips ──────────────────────────────────────────── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  min-height: 36px;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
  font-family: inherit;
}
.chip:hover { border-color: var(--accent); color: var(--accent-strong); }
.chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.chip-clear {
  background: var(--red-soft);
  border-color: rgba(239,68,68,0.4);
  color: var(--red);
}
.chip-clear:hover { background: var(--red); color: white; border-color: var(--red); }
.chip-x { font-weight: bold; margin-left: 2px; }

/* ── Spatial panel ──────────────────────────────────────────── */
.spatial-controls {
  display: grid;
  grid-template-columns: 1.2fr 1.2fr 0.8fr;
  gap: 10px;
  margin-bottom: 12px;
}
.spatial-controls .field { margin-bottom: 0; }

/* ── Timeline panel ─────────────────────────────────────────── */
.timeline-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

/* ── Log entry ──────────────────────────────────────────────── */
.log-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}
.log-coords {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

/* ── Results summary (above results) ─────────────────────────── */
.results-summary {
  margin-bottom: 12px;
}
.results-summary:empty { display: none; }
.results-count {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.results-count .count-icon { opacity: 0.7; }
.filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* ── Status messages ────────────────────────────────────────── */
.status {
  margin-bottom: 12px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}
.status:empty { display: none; }
.status.hint { background: var(--accent-soft); border-color: rgba(90,184,232,0.3); color: var(--accent-strong); }
.status.error { background: var(--red-soft); border-color: var(--red); color: var(--red); }
.status.success { background: var(--green-soft); border-color: var(--green); color: var(--green); }

/* ── Results ────────────────────────────────────────────────── */
.results {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Entry card ─────────────────────────────────────────────── */
.entry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  transition: border-color 0.15s, transform 0.15s;
  animation: fadeIn 0.25s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.entry:hover { border-color: var(--border-strong); }
.entry-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.entry-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  flex: 1;
  min-width: 0;
}
.cat {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.cat-catch { background: var(--green-soft); color: var(--green); }
.cat-maintenance { background: var(--amber-soft); color: var(--amber); }
.cat-weather { background: var(--accent-soft); color: var(--accent); }
.cat-observation { background: rgba(138,154,172,0.15); color: var(--text-dim); }
.cat-navigation { background: var(--purple-soft); color: var(--purple); }
.time {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
}
.distance {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
}
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 4px 10px;
  border-radius: 999px;
  white-space: nowrap;
}
.score-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin: 6px 0 10px;
}
.score-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-strong));
  border-radius: 2px;
  transition: width 0.3s ease-out;
}
.entry-text {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text);
  margin: 4px 0 10px;
  white-space: pre-wrap;
  word-wrap: break-word;
}
.entry-text:empty::before {
  content: '(no content)';
  color: var(--text-dim);
  font-style: italic;
}
.entry-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  flex-wrap: wrap;
}
.entry-loc {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.loc-name { color: var(--text); }
.entry-coords {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* ── Empty / welcome states ─────────────────────────────────── */
.empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
}
.empty-icon {
  font-size: 44px;
  margin-bottom: 12px;
  opacity: 0.7;
}
.empty-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-hint {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 16px;
}
.empty-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

/* ── Loading spinner ────────────────────────────────────────── */
.loading {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--accent);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Small screens ──────────────────────────────────────────── */
@media (max-width: 520px) {
  .spatial-controls { grid-template-columns: 1fr 1fr; }
  .spatial-controls .field:nth-child(3) { grid-column: 1 / -1; }
  .timeline-row, .log-row, .log-coords { grid-template-columns: 1fr; }
  .entry-foot { flex-direction: column; align-items: stretch; }
  .entry-foot .btn-danger { align-self: flex-end; }
}

/* Very narrow: hide tab labels, show only icons */
@media (max-width: 380px) {
  .tab-label { display: none; }
  .tab { padding: 10px 4px; }
  .tab-icon { font-size: 22px; }
  .stats { font-size: 11px; padding: 4px 10px; }
  h1 { font-size: 18px; }
  .brand .sub { font-size: 10px; }
}

/* Touch devices: kill hover */
@media (hover: none) {
  .btn:hover, .chip:hover, .tab:hover { /* noop */ }
}
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand">
      <span class="logo" aria-hidden="true">⚓</span>
      <div>
        <h1>Ship Log</h1>
        <span class="sub">Search · Locate · Log</span>
      </div>
    </div>
    <div class="stats" id="stats" aria-live="polite" title="Total log entries">…</div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Search mode">
    <button type="button" role="tab" class="tab" id="tab-semantic-btn" aria-selected="true" aria-controls="panel-semantic">
      <span class="tab-icon" aria-hidden="true">🔍</span>
      <span class="tab-label">Search</span>
    </button>
    <button type="button" role="tab" class="tab" id="tab-spatial-btn" aria-selected="false" aria-controls="panel-spatial" tabindex="-1">
      <span class="tab-icon" aria-hidden="true">📍</span>
      <span class="tab-label">Nearby</span>
    </button>
    <button type="button" role="tab" class="tab" id="tab-timeline-btn" aria-selected="false" aria-controls="panel-timeline" tabindex="-1">
      <span class="tab-icon" aria-hidden="true">📅</span>
      <span class="tab-label">Timeline</span>
    </button>
    <button type="button" role="tab" class="tab" id="tab-log-btn" aria-selected="false" aria-controls="panel-log" tabindex="-1">
      <span class="tab-icon" aria-hidden="true">✎</span>
      <span class="tab-label">Log</span>
    </button>
  </nav>

  <main>
    <!-- Semantic Search -->
    <section role="tabpanel" id="panel-semantic" aria-labelledby="tab-semantic-btn" class="panel">
      <div class="field">
        <label for="sem-q">Search your logbook</label>
        <input type="text" id="sem-q" placeholder="e.g. good chumming near Cape Edgecumbe" autocomplete="off" enterkeyhint="search">
      </div>
      <button type="button" class="btn btn-primary" onclick="doSearch()">Search</button>
      <div class="quick-chips" id="sem-quick">
        <span class="chip-label">Try one:</span>
        <button type="button" class="chip" onclick="quickSearch('good salmon catch')">good salmon catch</button>
        <button type="button" class="chip" onclick="quickSearch('engine maintenance')">engine maintenance</button>
        <button type="button" class="chip" onclick="quickSearch('rough seas')">rough seas</button>
        <button type="button" class="chip" onclick="quickSearch('hydraulic problem')">hydraulic problem</button>
        <button type="button" class="chip" onclick="quickSearch('tide change')">tide change</button>
      </div>
    </section>

    <!-- Nearby (Spatial) -->
    <section role="tabpanel" id="panel-spatial" aria-labelledby="tab-spatial-btn" class="panel" hidden>
      <div class="spatial-controls">
        <div class="field">
          <label for="sp-lat">Latitude</label>
          <input type="number" id="sp-lat" step="0.0001" value="57.053" inputmode="decimal" autocomplete="off">
        </div>
        <div class="field">
          <label for="sp-lon">Longitude</label>
          <input type="number" id="sp-lon" step="0.0001" value="-135.330" inputmode="decimal" autocomplete="off">
        </div>
        <div class="field">
          <label for="sp-radius">Radius (km)</label>
          <input type="number" id="sp-radius" value="50" min="1" max="500" inputmode="numeric">
        </div>
      </div>
      <div class="btn-stack">
        <button type="button" class="btn btn-primary" id="sp-geolocate" onclick="useMyPosition()">
          <span aria-hidden="true">🧭</span> Use my position
        </button>
        <button type="button" class="btn btn-ghost btn-block" onclick="doSpatial()">Find nearby</button>
      </div>
    </section>

    <!-- Timeline -->
    <section role="tabpanel" id="panel-timeline" aria-labelledby="tab-timeline-btn" class="panel" hidden>
      <div class="timeline-row">
        <div class="field">
          <label for="tl-from">From</label>
          <input type="date" id="tl-from">
        </div>
        <div class="field">
          <label for="tl-to">To</label>
          <input type="date" id="tl-to">
        </div>
      </div>
      <div class="field">
        <label for="tl-cat">Category</label>
        <select id="tl-cat">
          <option value="">All categories</option>
          <option value="catch">Catch</option>
          <option value="maintenance">Maintenance</option>
          <option value="weather">Weather</option>
          <option value="observation">Observation</option>
          <option value="navigation">Navigation</option>
        </select>
      </div>
      <button type="button" class="btn btn-primary" onclick="doTimeline()">Load timeline</button>
    </section>

    <!-- Log Entry -->
    <section role="tabpanel" id="panel-log" aria-labelledby="tab-log-btn" class="panel" hidden>
      <div class="field">
        <label for="log-text">What happened?</label>
        <textarea id="log-text" placeholder="e.g. Chummed for 45 min, set 600 fath on the slack. 32 sockeye." rows="4"></textarea>
      </div>
      <div class="log-row">
        <div class="field">
          <label for="log-category">Category</label>
          <select id="log-category">
            <option value="observation">Observation</option>
            <option value="catch">Catch</option>
            <option value="maintenance">Maintenance</option>
            <option value="weather">Weather</option>
            <option value="navigation">Navigation</option>
          </select>
        </div>
        <div class="field">
          <label for="log-loc">Location name</label>
          <input type="text" id="log-loc" placeholder="e.g. Cape Edgecumbe" autocomplete="off">
        </div>
      </div>
      <div class="log-coords">
        <div class="field">
          <label for="log-lat">Latitude</label>
          <input type="number" id="log-lat" step="0.0001" placeholder="optional" inputmode="decimal">
        </div>
        <div class="field">
          <label for="log-lon">Longitude</label>
          <input type="number" id="log-lon" step="0.0001" placeholder="optional" inputmode="decimal">
        </div>
      </div>
      <button type="button" class="btn btn-primary" id="log-submit" onclick="doLog()">Save log entry</button>
    </section>
  </main>

  <!-- Results area: filter chips + status + entries -->
  <div class="results-summary" id="results-summary"></div>
  <div class="status" id="status" role="status" aria-live="polite"></div>
  <div class="results" id="results"></div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  activeTab: 'semantic',
  lastResults: [],
  lastResultsMode: null, // 'semantic' | 'spatial' | 'timeline'
  lastFilters: {},
};

// ─── Boot ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setupTabs();
  setupEnterKeys();
  loadStats();
});

// ─── Tabs (keyboard accessible per WAI-ARIA Authoring Practices) ─────────────
function setupTabs() {
  const tabs = Array.from(document.querySelectorAll('[role="tab"]'));
  tabs.forEach((tab, idx) => {
    tab.addEventListener('click', () => activateTab(tab));
    tab.addEventListener('keydown', (e) => {
      let next = null;
      if (e.key === 'ArrowRight') next = tabs[(idx + 1) % tabs.length];
      else if (e.key === 'ArrowLeft') next = tabs[(idx - 1 + tabs.length) % tabs.length];
      else if (e.key === 'Home') next = tabs[0];
      else if (e.key === 'End') next = tabs[tabs.length - 1];
      if (next) {
        e.preventDefault();
        activateTab(next);
        next.focus();
      }
    });
  });
}

function activateTab(tab) {
  document.querySelectorAll('[role="tab"]').forEach(t => {
    t.setAttribute('aria-selected', 'false');
    t.setAttribute('tabindex', '-1');
  });
  tab.setAttribute('aria-selected', 'true');
  tab.removeAttribute('tabindex');

  document.querySelectorAll('[role="tabpanel"]').forEach(p => p.hidden = true);
  const panelId = tab.getAttribute('aria-controls');
  const panel = document.getElementById(panelId);
  if (panel) panel.hidden = false;

  state.activeTab = panelId.replace('panel-', '');

  // Move focus into the panel for keyboard users (best-effort, non-intrusive)
  setTimeout(() => {
    const focusTarget = panel?.querySelector('input, textarea, select');
    if (focusTarget && document.activeElement === document.body) {
      focusTarget.focus({ preventScroll: true });
    }
  }, 30);
}

// ─── Enter key shortcuts ─────────────────────────────────────────────────────
function setupEnterKeys() {
  document.getElementById('sem-q').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
  });
  document.getElementById('log-text').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) doLog();
  });
}

// ─── Stats ───────────────────────────────────────────────────────────────────
async function loadStats() {
  const el = document.getElementById('stats');
  try {
    const r = await fetch('/api/stats');
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (d.entries != null) {
      el.textContent = d.entries.toLocaleString() + ' entries';
    } else {
      el.textContent = '— entries';
    }
  } catch {
    el.textContent = 'offline';
    el.style.color = 'var(--text-dim)';
    el.style.background = 'var(--surface-2)';
  }
}

// ─── Semantic Search ─────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('sem-q').value.trim();
  if (!q) {
    setStatus("Type something to search — try one of the suggestions.", 'hint');
    document.getElementById('sem-q').focus();
    return;
  }
  setStatus('<span class="loading"></span> Searching…');
  showLoading();
  try {
    const r = await fetch('/api/search?q=' + encodeURIComponent(q) + '&k=20');
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Search failed');
    state.lastResults = d.results || [];
    state.lastResultsMode = 'semantic';
    state.lastFilters = { q };
    setStatus('');
    renderResults();
    renderFilters();
  } catch (err) {
    setStatus(err.message, 'error');
    clearResults();
  }
}

function quickSearch(q) {
  document.getElementById('sem-q').value = q;
  doSearch();
}

// ─── Spatial (Nearby) ─────────────────────────────────────────────────────────
async function doSpatial() {
  const lat = parseFloat(document.getElementById('sp-lat').value);
  const lon = parseFloat(document.getElementById('sp-lon').value);
  const radius = parseFloat(document.getElementById('sp-radius').value || '50');
  if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
    setStatus('Enter valid latitude and longitude — or tap "Use my position".', 'error');
    return;
  }
  setStatus('<span class="loading"></span> Searching nearby…');
  showLoading();
  try {
    const r = await fetch('/api/nearby?lat=' + lat + '&lon=' + lon + '&radius=' + radius + '&k=20');
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Search failed');
    state.lastResults = d.results || [];
    state.lastResultsMode = 'spatial';
    state.lastFilters = { lat, lon, radius };
    setStatus('');
    renderResults();
    renderFilters();
  } catch (err) {
    setStatus(err.message, 'error');
    clearResults();
  }
}

function useMyPosition() {
  const btn = document.getElementById('sp-geolocate');
  if (!navigator.geolocation) {
    setStatus("Your browser doesn't support location — enter coordinates manually.", 'error');
    return;
  }
  const original = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span> Finding position…';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      document.getElementById('sp-lat').value = lat.toFixed(4);
      document.getElementById('sp-lon').value = lon.toFixed(4);
      btn.innerHTML = '✓ Position set';
      setStatus('Position set: ' + lat.toFixed(4) + ', ' + lon.toFixed(4) + '. Tap "Find nearby".', 'success');
      setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 2200);
    },
    (err) => {
      btn.innerHTML = original;
      btn.disabled = false;
      const msgs = {
        1: 'Location permission denied. Enable it in your browser settings.',
        2: 'Position unavailable. Check your device connection.',
        3: 'Position request timed out. Try again.',
      };
      setStatus(msgs[err.code] || 'Could not get position: ' + err.message, 'error');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
  );
}

// ─── Timeline ────────────────────────────────────────────────────────────────
async function doTimeline() {
  const from = document.getElementById('tl-from').value;
  const to = document.getElementById('tl-to').value;
  const cat = document.getElementById('tl-cat').value;
  let qs = '/api/timeline?k=50';
  if (from) qs += '&from=' + from + 'T00:00:00Z';
  if (to) qs += '&to=' + to + 'T23:59:59Z';
  if (cat) qs += '&category=' + cat;
  setStatus('<span class="loading"></span> Loading timeline…');
  showLoading();
  try {
    const r = await fetch(qs);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Timeline failed');
    state.lastResults = d.results || [];
    state.lastResultsMode = 'timeline';
    state.lastFilters = { from, to, category: cat };
    setStatus('');
    renderResults();
    renderFilters();
  } catch (err) {
    setStatus(err.message, 'error');
    clearResults();
  }
}

// ─── Log Entry ───────────────────────────────────────────────────────────────
async function doLog() {
  const text = document.getElementById('log-text').value.trim();
  if (!text) {
    setStatus('Write something about what happened before saving.', 'error');
    document.getElementById('log-text').focus();
    return;
  }
  const body = {
    text,
    category: document.getElementById('log-category').value,
    location_name: document.getElementById('log-loc').value.trim() || undefined,
    lat: parseFloat(document.getElementById('log-lat').value) || undefined,
    lon: parseFloat(document.getElementById('log-lon').value) || undefined,
  };
  const btn = document.getElementById('log-submit');
  // Check for stored write key
  let key = localStorage.getItem('shiplog_key') || '';
  if (!key) {
    key = prompt('Enter write key to log entries:') || '';
    if (key) localStorage.setItem('shiplog_key', key);
  }
  const headers = { 'Content-Type': 'application/json' };
  if (key) headers['X-Log-Key'] = key;
  btn.disabled = true;
  setStatus('<span class="loading"></span> Saving…');
  try {
    const r = await fetch('/api/log', {
      method: 'POST',
      headers,
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Save failed');
    document.getElementById('log-text').value = '';
    document.getElementById('log-loc').value = '';
    document.getElementById('log-lat').value = '';
    document.getElementById('log-lon').value = '';
    setStatus('✓ Saved · ' + d.id, 'success');
    loadStats();
  } catch (err) {
    setStatus(err.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ─── Delete ──────────────────────────────────────────────────────────────────
async function deleteEntry(id) {
  if (!id) return;
  if (!confirm('Delete this entry?\n\nThis cannot be undone.')) return;
  // Check for stored write key (set via ?key= URL param or prompt)
  let key = localStorage.getItem('shiplog_key') || '';
  if (!key) {
    key = prompt('Enter write key to delete:') || '';
    if (key) localStorage.setItem('shiplog_key', key);
  }
  const headers = key ? { 'X-Log-Key': key } : {};
  setStatus('<span class="loading"></span> Deleting…');
  try {
    const r = await fetch('/api/log/' + encodeURIComponent(id), { method: 'DELETE', headers });
    if (!r.ok && r.status !== 404) {
      const d = await r.json().catch(() => ({}));
      throw new Error(d.error || 'Delete failed (' + r.status + ')');
    }
    state.lastResults = state.lastResults.filter(x => x.id !== id);
    renderResults();
    renderFilters();
    setStatus('✓ Deleted', 'success');
    loadStats();
  } catch (err) {
    setStatus(err.message + ' — delete endpoint may not be enabled yet.', 'error');
  }
}

// ─── Results rendering ───────────────────────────────────────────────────────
function clearResults() {
  state.lastResults = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('results-summary').innerHTML = '';
}

function showLoading() {
  document.getElementById('results').innerHTML =
    '<div class="entry" style="text-align:center; padding: 28px;">' +
    '<span class="loading"></span>' +
    '<span style="margin-left:10px; color: var(--text-dim);">Working…</span></div>';
  document.getElementById('results-summary').innerHTML = '';
}

function renderFilters() {
  const container = document.getElementById('results-summary');
  const chips = [];
  const f = state.lastFilters || {};

  if (state.lastResultsMode === 'semantic' && f.q) {
    chips.push(filterChip('Search: ' + truncate(f.q, 28), () => {
      document.getElementById('sem-q').value = '';
      clearResults();
      setStatus('Search cleared.', 'success');
    }));
  }
  if (state.lastResultsMode === 'spatial') {
    if (Number.isFinite(f.lat)) chips.push(filterChip('Lat ' + f.lat.toFixed(3), () => {
      document.getElementById('sp-lat').value = '57.053';
      doSpatial();
    }));
    if (Number.isFinite(f.lon)) chips.push(filterChip('Lon ' + f.lon.toFixed(3), () => {
      document.getElementById('sp-lon').value = '-135.330';
      doSpatial();
    }));
    if (f.radius) chips.push(filterChip('Radius ' + f.radius + ' km', () => {
      document.getElementById('sp-radius').value = '50';
      doSpatial();
    }));
  }
  if (state.lastResultsMode === 'timeline') {
    if (f.from) chips.push(filterChip('From ' + f.from, () => {
      document.getElementById('tl-from').value = '';
      doTimeline();
    }));
    if (f.to) chips.push(filterChip('To ' + f.to, () => {
      document.getElementById('tl-to').value = '';
      doTimeline();
    }));
    if (f.category) chips.push(filterChip('Category: ' + f.category, () => {
      document.getElementById('tl-cat').value = '';
      doTimeline();
    }));
  }

  if (!state.lastResultsMode && state.lastResults.length === 0) {
    container.innerHTML = '';
    return;
  }

  const n = state.lastResults.length;
  let countLabel;
  if (n === 0) {
    countLabel = '';
  } else if (state.lastResultsMode === 'timeline' && !hasTimelineFilter()) {
    countLabel = 'Showing all ' + n + ' ' + (n === 1 ? 'entry' : 'entries');
  } else {
    countLabel = n + ' ' + (n === 1 ? 'entry' : 'entries');
  }

  let html = '';
  if (countLabel) {
    html += '<div class="results-count"><span class="count-icon">📒</span> ' + escHtml(countLabel) + '</div>';
  }
  if (chips.length > 0) {
    chips.push('<button type="button" class="chip chip-clear" onclick="clearAllFilters()"><span class="chip-x">×</span> Clear all</button>');
    html += '<div class="filter-chips">' + chips.join('') + '</div>';
  }
  container.innerHTML = html;
}

function hasTimelineFilter() {
  const f = state.lastFilters || {};
  return !!(f.from || f.to || f.category);
}

function filterChip(label, onRemove) {
  const id = 'chip-' + Math.random().toString(36).slice(2, 8);
  // Inline the handler so onclick doesn't need global namespace lookups
  window['_chip_' + id] = onRemove;
  return '<button type="button" class="chip chip-clear" onclick="window[\'_chip_' + id + '\']()">' +
         escHtml(label) + ' <span class="chip-x">×</span></button>';
}

function clearAllFilters() {
  state.lastFilters = {};
  state.lastResults = [];
  state.lastResultsMode = null;
  document.getElementById('sem-q').value = '';
  document.getElementById('sp-lat').value = '57.053';
  document.getElementById('sp-lon').value = '-135.330';
  document.getElementById('sp-radius').value = '50';
  document.getElementById('tl-from').value = '';
  document.getElementById('tl-to').value = '';
  document.getElementById('tl-cat').value = '';
  setStatus('');
  renderResults();
  renderFilters();
}

function renderResults() {
  const el = document.getElementById('results');
  const results = state.lastResults;

  if (results.length === 0) {
    if (!state.lastResultsMode) {
      // Welcome state (no search yet)
      el.innerHTML =
        '<div class="empty">' +
          '<div class="empty-icon">⚓</div>' +
          '<div class="empty-title">Welcome aboard</div>' +
          '<div class="empty-hint">Search by meaning, find entries near you,<br>or browse the logbook by date.</div>' +
          '<div class="empty-suggestions">' +
            '<button type="button" class="chip" onclick="quickSearch(\'good salmon catch\')">good salmon catch</button>' +
            '<button type="button" class="chip" onclick="quickSearch(\'engine maintenance\')">engine maintenance</button>' +
            '<button type="button" class="chip" onclick="quickSearch(\'rough seas\')">rough seas</button>' +
            '<button type="button" class="chip" onclick="activateTabByName(\'timeline\')">browse timeline</button>' +
          '</div>' +
        '</div>';
    } else {
      // No results for the active query
      const msg = state.lastResultsMode === 'semantic'
        ? 'No entries match this search.'
        : state.lastResultsMode === 'spatial'
          ? 'No entries found in this area.'
          : 'No entries in this date range.';
      el.innerHTML =
        '<div class="empty">' +
          '<div class="empty-icon">🔍</div>' +
          '<div class="empty-title">Nothing found</div>' +
          '<div class="empty-hint">' + escHtml(msg) + '<br>Try different terms, widen your range, or clear filters above.</div>' +
        '</div>';
    }
    return;
  }

  el.innerHTML = results.map(renderEntry).join('');
}

function renderEntry(r) {
  const m = r.metadata || {};
  const cat = m.category || 'observation';
  const ts = m.timestamp ? formatTime(m.timestamp) : '';
  const coords = (Number.isFinite(m.lat) && Number.isFinite(m.lon))
    ? m.lat.toFixed(4) + ', ' + m.lon.toFixed(4) : '';
  const dist = state.lastResultsMode === 'spatial' && r.distance_km != null
    ? r.distance_km.toFixed(1) + ' km away' : '';
  const score = state.lastResultsMode === 'semantic' && Number.isFinite(r.score)
    ? Math.round(r.score * 100) : null;
  const locName = m.location_name || '';
  const text = m.text || m.description || '';

  return '<article class="entry" aria-label="' + escHtml(cat) + ' entry">' +
    '<div class="entry-top">' +
      '<div class="entry-meta">' +
        '<span class="cat cat-' + escHtml(cat) + '">' + escHtml(cat) + '</span>' +
        (ts ? '<span class="time">' + escHtml(ts) + '</span>' : '') +
        (dist ? '<span class="distance">' + escHtml(dist) + '</span>' : '') +
      '</div>' +
      (score !== null ? '<span class="score-badge" title="Semantic similarity">' + score + '% match</span>' : '') +
    '</div>' +
    (score !== null ? '<div class="score-bar"><div class="score-bar-fill" style="width:' + score + '%"></div></div>' : '') +
    '<div class="entry-text">' + escHtml(text) + '</div>' +
    '<div class="entry-foot">' +
      '<div class="entry-loc">' +
        (locName ? '<span class="loc-name">📍 ' + escHtml(locName) + '</span>' : '') +
        (coords ? '<span class="entry-coords">' + escHtml(coords) + '</span>' : '') +
      '</div>' +
      '<button type="button" class="btn-danger" onclick="deleteEntry(\'' + escAttr(r.id) + '\')" aria-label="Delete this entry">Delete</button>' +
    '</div>' +
  '</article>';
}

function activateTabByName(name) {
  const tab = document.getElementById('tab-' + name + '-btn');
  if (tab) activateTab(tab);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg || '';
  el.className = 'status' + (type ? ' ' + type : '');
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString(undefined, {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  } catch {
    return iso;
  }
}

function truncate(s, n) {
  s = String(s);
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escAttr(s) {
  return escHtml(s).replace(/`/g, '&#96;');
}
</script>
